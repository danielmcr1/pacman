trigger:
  branches:
    include:
      - master

pr:
  branches:
    include:
      - master

variables:
  - group: pacman-prod-vars
  - name: NODE_VERSION
    value: '18.x'

stages:
- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: Build
    displayName: 'Build Job'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - checkout: self

    - task: UseNode@1
      displayName: 'Set up Node.js'
      inputs:
        version: '$(NODE_VERSION)'

    - script: |
        npm install
        npm run build
      displayName: 'Install dependencies and build'

    - task: ArchiveFiles@2
      displayName: 'Zip artifact for deployment'
      inputs:
        rootFolderOrFile: '$(Build.SourcesDirectory)/build'
        includeRootFolder: false
        archiveFile: '$(Build.ArtifactStagingDirectory)/pacman-prod.zip'

    - task: PublishBuildArtifacts@1
      displayName: 'Upload Artifact'
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)/pacman-prod.zip'
        artifactName: 'pacman-prod'

- stage: Deploy
  displayName: 'Deploy Stage'
  dependsOn: Build
  jobs:
  - deployment: DeployToAzure
    displayName: 'Deploy to Azure Static Web App'
    environment: Production
    pool:
      vmImage: 'ubuntu-latest'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadBuildArtifacts@0
            displayName: 'Download Artifact'
            inputs:
              artifactName: 'pacman-prod'
              downloadPath: '$(Build.ArtifactStagingDirectory)'

          - script: unzip $(Build.ArtifactStagingDirectory)/pacman-prod/pacman-prod.zip -d $(Build.ArtifactStagingDirectory)
            displayName: 'Unzip artifact'

          - task: AzureStaticWebApp@0
            displayName: 'Deploy to Azure Static Web App'
            inputs:
              azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN)
              app_location: '$(Build.ArtifactStagingDirectory)/build'
              output_location: ''
              skip_app_build: true
