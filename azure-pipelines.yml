# trigger the pipeline on pushes to the 'dev' branch
trigger:
  branches:
    include:
      - dev

# use a microsoft hosted ubuntu agent for all stages
pool:
  vmImage: 'ubuntu-latest'

# load variables from the variable group pacman-dev-vars
variables:
- group: pacman-dev-vars

stages:

# stage 1: build and publish artifact

- stage: Build
  displayName: 'Build and Publish Artifact'
  jobs:
  - job: Build
    displayName: 'Build Job'
    pool:
      vmImage: 'ubuntu-latest'   # use ubuntu agent for build
    steps:
      # checkout the repository
      - checkout: self
        fetchDepth: 1
        lfs: false
        clean: false

      # install project dependencies (
      - script: npm install
        displayName: 'Install Dependencies'

      # build the project
      - script: npm run build
        displayName: 'Build Project'

      # publish the dist folder as an artifact named drop
      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: 'dist'
          artifact: drop
        displayName: 'Publish Artifact'


# stage 2: deploy to azure static web apps

- stage: Deploy
  displayName: 'Deploy to Azure Static Web Apps'
  dependsOn: Build
  # only run this stage if the source branch is dev
  condition: eq(variables['Build.SourceBranchName'], 'dev')
  jobs:
  - job: Deploy
    displayName: 'Deploy Job'
    pool:
      vmImage: 'ubuntu-latest'   # use ubuntu agent for deployment
    steps:
      # download the published artifact into the pipeline workspace
      - task: DownloadPipelineArtifact@2
        inputs:
          artifact: drop
          path: '$(Pipeline.Workspace)/drop'
        displayName: 'Download Artifact'

      # deploy to azure static web apps using the built in task
   
      - task: AzureStaticWebApp@0
        inputs:
          app_location: '$(Pipeline.Workspace)/drop'   # location of the pre built app
          skip_app_build: true
          azure_static_web_apps_api_token: $(AZURE_STATIC_WEB_APPS_API_TOKEN)
        displayName: 'Deploy via Azure Static Web Apps Task'
