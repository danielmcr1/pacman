# Trigger the pipeline on changes to the specified branches
trigger:
  branches:
    include:
      - dev       # Development branch
      - staging   # Staging branch
      - production      # Production branch

# Use an Ubuntu-based agent for the pipeline jobs
pool:
  vmImage: 'ubuntu-latest'

stages:


# Build Stage: Checkout, install dependencies, and build the application

- stage: Build
  displayName: 'Build Stage'
  jobs:
  - job: BuildJob
    displayName: 'Install and Build Application'
    steps:
      # checkout the repository with a shallow clone (depth 1), lfs off, and without cleaning the workspace
      - checkout: self
        clean: false
        fetchDepth: 1
        lfs: false
      # install dependencies using npm
      - script: |
          echo "Installing dependencies..."
          npm install
        displayName: 'Install Dependencies'
      # build the application using npm 
      - script: |
          echo "Building the application..."
          npm run build
        displayName: 'Build Application'

# Test Stage: Simulated testing step (replace npm test after script is added in package json)

- stage: Test
  displayName: 'Test Stage'
  dependsOn: Build  # only run if the Build stage succeeds
  jobs:
  - job: TestJob
    displayName: 'Simulated Testing'
    steps:
      - script: |
          # This is where  test commands would run.
          # Replace the following line with: npm run test when tests are added.
          echo "Simulating tests."
        displayName: 'Simulate Test Run'

# deploy stage: deploy the built app to the azure static web app based on the branch

- stage: Deploy
  displayName: 'Deploy Stage'
  dependsOn: Test  # only run if the test stage succeeds
  jobs:

  # deployment for the dev environment

  - job: DeployDev
    displayName: 'Deploy to Dev Environment'
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/dev')  # only run for the dev branch
    variables:
      - group: pacman-dev-vars  # load environment specific variables (e.g. AZURE_STATIC_WEBAPPS_API_TOKEN)
    steps:
      - task: AzureStaticWebApp@0
        displayName: 'Deploy to Dev Static Web App'
        inputs:
          # path to app code
          app_location: '.'
          # api location empty as no api is being used
          api_location: ''
          # output folder generated by the build
          output_location: 'build'
          # skip app build since the build stage already handled it
          skip_app_build: true
          # deployment token stored in your variable group 
          azure_static_web_apps_api_token: '$(AZURE_STATIC_WEBAPPS_API_TOKEN)'

  # deployment for the staging environment
  - job: DeployStaging
    displayName: 'Deploy to Staging Environment'
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/staging')  # only run for the staging branch
    variables:
      - group: pacman-st-vars  # load staging specific variables
    steps:
      - task: AzureStaticWebApp@0
        displayName: 'Deploy to Staging Static Web App'
        inputs:
          app_location: '.'
          api_location: ''
          output_location: 'build'
          skip_app_build: true
          azure_static_web_apps_api_token: '$(AZURE_STATIC_WEBAPPS_API_TOKEN)'

  # deployment for the production environment
  - job: DeployProd
    displayName: 'Deploy to Production Environment'
    condition: eq(variables['Build.SourceBranch'], 'refs/heads/production')  # only run for the production branch
    variables:
      - group: pacman-prod-vars  # load production specific variables
    steps:
      - task: AzureStaticWebApp@0
        displayName: 'Deploy to Production Static Web App'
        inputs:
          app_location: '.'
          api_location: ''
          output_location: 'build'
          skip_app_build: true
          azure_static_web_apps_api_token: '$(AZURE_STATIC_WEBAPPS_API_TOKEN)'
