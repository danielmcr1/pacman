trigger:
  branches:
    include:
      - staging

variables:
  - group: pacman-st-vars

stages:
  # stage 1: build and test
  - stage: BuildAndTest
    displayName: 'Build and Test Stage'
    jobs:
      - job: BuildAndTest
        displayName: 'Build and Test Job'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          # dummy test step, placeholder since no tests currently exist
          - script: |
              echo "Running dummy tests..."
              # Exit with 0 to indicate success (replace with real tests later)
              exit 0
            displayName: 'Run Dummy Tests'

          # copy to the artifact staging directory
          - task: CopyFiles@2
            displayName: 'Copy necessary files for artifact'
            inputs:
              SourceFolder: '$(Build.SourcesDirectory)'
              Contents: |
                assets/**
                bundle.js
                index.css
                index.html
              TargetFolder: '$(Build.ArtifactStagingDirectory)/drop'

          # publish the copied files as an artifact named drop
          - task: PublishBuildArtifacts@1
            displayName: 'Publish Artifact'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)/drop'
              ArtifactName: 'drop'
              publishLocation: 'Container'

  # stage 2: deploy to azure static web app
  - stage: Deploy
    displayName: 'Deploy Stage'
    dependsOn: BuildAndTest
    jobs:
      - deployment: DeployToStaticWebApp
        displayName: 'Deploy to Azure Static Web App'
        environment: 'production'  
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                # download the artifact published in the previous stage
                - task: DownloadPipelineArtifact@2
                  displayName: 'Download Artifact'
                  inputs:
                    artifact: 'drop'

                # deploy to azure static web app using the downloaded artifact
                - task: AzureStaticWebApp@0
                  displayName: 'Deploy to Azure Static Web App'
                  inputs:
                    app_location: $(app_location)       
                    api_location: ''                   
                    output_location: $(output_location)
                    skip_app_build: true               
                  env:
                    azure_static_web_apps_api_token: $(deployment_token)
