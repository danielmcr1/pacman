trigger:
  branches:
    include:
      - production

pool:
  name: LocalMachine
  demands: Agent.Name -equals Agent1

variables:
- group: pacman-prod-vars

stages:

# stage 1: build and publish artifact
- stage: Build
  displayName: 'Build and Publish Artifact'
  jobs:
  - job: Build
    displayName: 'Build Job'
    steps:
      - checkout: self
        fetchDepth: 1
        lfs: false
        clean: false

      - powershell: |
          npm install
        displayName: 'Install Dependencies'

      - powershell: |
          npm run build
        displayName: 'Build Project'

      - task: PublishBuildArtifacts@1
        inputs:
          PathtoPublish: 'dist'       # folder containing built project
          ArtifactName: 'drop'         # artifact name
          publishLocation: 'Container'
        displayName: 'Publish Artifacts'

# stage 2: deploy to azure static web apps with azure cli
- stage: Deploy_StaticWebApp
  displayName: 'Deploy to Azure Static Web Apps'
  condition: and(succeeded(), eq(variables['Build.SourceBranchName'], 'production'))
  jobs:
  - job: Deploy
    displayName: 'Deploy to Azure Static Web Apps'
    steps:
      - checkout: self
        fetchDepth: 1
        lfs: false
        clean: false

      - task: DownloadBuildArtifacts@0
        inputs:
          artifactName: 'drop'
          downloadPath: '$(Pipeline.Workspace)'
        displayName: 'Download Artifact'

      - script: |
          echo "Installing Static Web Apps CLI..."
          npm install -g @azure/static-web-apps-cli
        displayName: 'Install Static Web Apps CLI'

      - script: |
          echo "Deploying to Azure Static Web App..."
          swa deploy $(Pipeline.Workspace)/drop --deployment-token $(AZURE_STATIC_WEB_APPS_API_TOKEN) --app-location .
        displayName: 'Deploy via SWA CLI'

