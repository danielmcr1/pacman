trigger:
  branches:
    include:
      - staging

stages:
  - stage: BuildAndTest
    displayName: 'Build and Test Stage'
    jobs:
      - job: BuildAndTest
        displayName: 'Build and Test Job'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - script: |
              echo "Running dummy tests..."
              exit 0
            displayName: 'Run Dummy Tests'

          # List files in 'dist' to verify everything is included
          - task: Bash@3
            displayName: 'List dist/ contents'
            inputs:
              targetType: 'inline'
              script: |
                echo "Listing contents of dist/"
                ls -R $(Build.SourcesDirectory)/dist

          # Publish Build Artifact (Ensures all files from dist are included)
          - task: PublishBuildArtifacts@1
            displayName: 'Publish Build Artifact'
            inputs:
              PathtoPublish: 'dist'
              ArtifactName: 'pacman-build'
              publishLocation: 'Container'

  - stage: Deploy
    displayName: 'Deploy Stage'
    dependsOn: BuildAndTest
    jobs:
      - deployment: DeployToStaticWebApp
        displayName: 'Deploy to Azure Static Web App'
        environment: 'staging'
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadPipelineArtifact@2
                  displayName: 'Download Artifact'
                  inputs:
                    artifact: 'pacman-build'

                - task: AzureStaticWebApp@0
                  displayName: 'Deploy to Azure Static Web App'
                  inputs:
                    app_location: '/'
                    api_location: ''
                    output_location: 'dist'  # Make sure Azure deploys from 'dist'
                    skip_app_build: true
                  env:
                    azure_static_web_apps_api_token: $(deployment_token)
