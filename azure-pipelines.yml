trigger:
  branches:
    include:
      - production

pool:
  name: LocalMachine
  demands: Agent.Name -equals Agent1

variables:
- group: pacman-prod-vars

stages:

# stage 1: build and publish artifact

- stage: Build
  displayName: 'Build and Publish Artifact'
  jobs:
  - job: Build
    displayName: 'Build Job'
    steps:
      - checkout: self
        fetchDepth: 1
        lfs: false
        clean: false

      - powershell: |
          npm install
        displayName: 'Install Dependencies'

      - powershell: |
          npm run build
        displayName: 'Build Project'

      - task: PublishBuildArtifacts@1
        inputs:
          PathtoPublish: 'dist'       # folder containing built project
          ArtifactName: 'drop'         # artifact name
          publishLocation: 'Container'
        displayName: 'Publish Artifacts'


# stage 3: deploy to azure static web apps with azure cli

- stage: Deploy_StaticWebApp
  displayName: 'Deploy to Azure Static Web Apps'
  condition: and(succeeded(), eq(variables['Build.SourceBranchName'], 'production'))
  jobs:
  - job: Deploy
    displayName: 'Deploy to Azure Static Web Apps'
    steps:
      - checkout: self
        fetchDepth: 1
        lfs: false
        clean: false

      - task: DownloadBuildArtifacts@0
        inputs:
          artifactName: 'drop'
          downloadPath: '$(Pipeline.Workspace)'
        displayName: 'Download Artifact'

      - powershell: |
          Write-Host "Logging in to Azure CLI using service principal..."
          az login --service-principal -u $(AZURE_APP_ID) -p $(AZURE_APP_SECRET) --tenant $(AZURE_TENANT)
          
          Write-Host "Deploying to Azure Static Web App..."
          az staticwebapp deploy `
            --name $(WEBAPP_NAME) `
            --resource-group $(RESOURCE_GROUP) `
            --subscription $(AZURE_SUBSCRIPTION) `
            --app-artifact-location "$(Pipeline.Workspace)\drop" `
            --api-token $env:AZURE_STATIC_WEB_APPS_API_TOKEN
        displayName: 'Deploy via Azure CLI'
