# This pipeline triggers when changes are made to the production branch
trigger:
  branches:
    include:
      - production

# Specifies the type of agent (a self-hosted machine) that will run the pipeline
pool:
  name: LocalMachine
  demands: Agent.Name -equals Agent1

# Define the different stages in the pipeline
stages:

# Stage 1: Build, this runs when code is pushed to the production branch
- stage: Build
  displayName: 'Build and Publish Artifact'
  jobs:
  - job: Build
    steps:
    
    # Checkout the repository, disabling Git LFS (since it's not used)
    - checkout: self
      fetchDepth: 1
      lfs: false  # Disable Git LFS

    # Install all project dependencies from package.json
    - powershell: |
        npm install
      displayName: 'Install Dependencies'

    # Build the project
    - powershell: |
        npm run build
      displayName: 'Build Project'

    # Save the build output as an artifact so it can be deployed later
    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: 'dist' # Path to the built project
        ArtifactName: 'drop' # Name of the artifact (folder where files are stored)
        publishLocation: 'Container'
      displayName: 'Publish Artifacts'

# Stage 2: Deploy to Azure Static Web Apps
- stage: Deploy
  displayName: 'Deploy to Azure Static Web Apps'
  condition: and(succeeded(), eq(variables['Build.SourceBranchName'], 'production')) # Only runs on production branch
  jobs:
    - job: Deploy
      steps:
        # Checkout the repository and clean before deployment
        - checkout: self
          fetchDepth: 1
          lfs: false  # Disable Git LFS
          clean: true  # Clean the working directory before checkout

        # Deploy to Azure Static Web Apps
        - task: AzureStaticWebApp@0
          inputs:
            app_location: '/'  # Root of the app
            api_location: 'null'  # No API used
            output_location: 'dist'  # Build folder
            azure_static_web_apps_api_token: $(AZURE_STATIC_WEBAPPS_API_TOKEN) # The secret token
          displayName: 'Deploy to Azure Static Web Apps'
